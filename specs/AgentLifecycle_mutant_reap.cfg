\* Mutation 1: reap-while-held enabled. TLC MUST report an Inv_NoHeldReap
\* violation (a reaped agent still held by a consumer). If this run passes, the
\* invariant is toothless. verify-specs asserts this run fails.
SPECIFICATION Spec

CONSTANTS
    Agents = {a1, a2}
    Consumers = {c1, c2}
    AllowReapWhileHeld = TRUE
    AllowStealGrant = FALSE

INVARIANTS
    TypeOK
    Inv_NoDoubleOwnership
    Inv_NoHeldReap
