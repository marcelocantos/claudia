  T5:
    name: claudia Agents support conversation rewind — roll a session back to an earlier turn and resume
    status: achieved
    value: 5.0
    cost: 5.0
    actual_cost: 3.0
    acceptance:
    - Agent exposes a rewind primitive that rolls a live session back to a chosen turn boundary and resumes it, without the caller performing external JSONL surgery. It owns the process kill + transcript edit + resume + derived-state reset as one atomic operation.
    - 'Metamorphic oracle: after rewind(N) followed by re-sending a prompt, the session JSONL prefix up to the cut point is byte-identical to the pre-rewind transcript. Derived Agent state (accumulated Usage counters, the tailJSONL read offset, the ready channel, event subscribers) is recomputed to match the surviving prefix — no stale token counts, no double-fired events.'
    - Rewinding to a boundary that falls mid-tool-use or mid-assistant-message (a single logical assistant message is split across multiple JSONL lines; only the last carries stop_reason) is either rejected with a clear error or snapped to the nearest safe turn boundary — it never corrupts the transcript.
    - The pre-rewind transcript is preserved so a rewind is itself undoable — either non-destructively via a new chained session id (reusing chain.go + grok-style history replay) or via a backup of the truncated tail.
    - 'A scope decision is recorded: conversation-only rewind vs also restoring working-tree/code state (Claude Code''s native /rewind restores both). If code-state rewind is out of scope for v1, that is documented, ideally with a git-snapshot pairing noted as the future extension.'
    - 'The load-bearing unknown is resolved first and recorded: a single CLAUDIA_LIVE experiment confirms whether `claude --resume <id>` against a truncated JSONL honours the truncation and appends after it, or rewrites/restores full history from another store. The chosen strategy (in-place truncate vs replay-into-fresh-session) follows from that result.'
    context: 'Raised 2026-07-05 from a user request to support a /rewind capability for claudia-managed agents. Investigation findings: (1) A session is a UUID-keyed transcript at ~/.claude/projects/<escaped-workdir>/<sessionID>.jsonl (SessionJSONLPath); resume is `--resume <id>` and appends to the SAME file — inferred because claudia''s tailJSONL follows the fixed jsonlPath through resume and the resume path is a supported/tested mode (T1.4 live tests). So the user''s ''scorched earth'' approach — kill the process, trim the JSONL at a turn boundary, resume the same id — is architecturally aligned. (2) Two viable strategies, both with in-repo building blocks: Strategy A (in-place truncation + --resume, cheapest, same session id, destructive); Strategy B (replay the surviving prefix into a fresh --session-id and link old→new via chain.go — grok/realtime.go already ''replays prior conversation history into a fresh session'', and chain.go already links rolled-over session ids — non-destructive but re-costs tokens). Recommendation: implement as a first-class Agent.Rewind operation rather than external file surgery, because the Agent holds live state (open tail fd + byte offset, accumulated Usage, ready channel, subscribers) that must be reset atomically with the transcript edit; keep Strategy B as a non-destructive fallback. Oracle-first: /rewind is class-1 decidable with a metamorphic oracle (rewind then replay → prefix byte-identical to original; usage == sum of surviving turns; no double-fired events) plus a fault-injection case (rewind mid-tool-use must be rejected/snapped, not corrupt the file). The one thing to verify before building anything: does --resume honour a truncated JSONL (manufacture the referent with one live experiment). Distinct from Claude Code''s native /rewind, which is an interactive checkpoint feature (restores code + conversation) not readily drivable from claudia''s stream-json/tmux harness — the user already expects out-of-the-box support to be hard.'
    origin: user request 2026-07-05
    discovered: 2026-07-05
    achieved: 2026-07-05
