# bullseye.yaml — convergence targets for this project.
#
# Targets are desired project states expressed as testable properties,
# with dependency tracking and frontier computation. This file is the
# source of truth: read and written by the bullseye MCP server, and safe
# to hand-edit (the targets live below).
#
# What is bullseye / how do I install it?
#   https://github.com/marcelocantos/bullseye
#
# This banner is regenerated by bullseye on every write — edit the
# targets, not these lines.
schema_version: 5
targets:
  T1:
    name: claudia ships v1.0 with a settled public API contract
    status: identified
    value: 5.0
    cost: 3.0
    acceptance:
    - A v1.0.0 tag is published on master and the release notes catalogue the breaking API changes that landed during the settling period.
    - STABILITY.md's "Gaps and prerequisites for 1.0" section is empty (or rewrites itself into a post-1.0 changelog).
    - go doc on each public type and function reads as self-sufficient — no required context from STABILITY.md or README.
    - All sub-targets (T1.1 through T1.5) are achieved; the release skill's settling-period gate is satisfied.
    context: claudia is currently at v0.9.x and pre-1.0 by design — STABILITY.md tracks the gaps that need closing before 1.0 locks in a backwards-compatibility contract. After 1.0 a major bump means forking the module (claudia2), so the API design needs to settle first. The sub-targets correspond directly to the four gap categories in STABILITY.md (API design fixes, behavioural fixes, documentation, testing/CI) plus a small packaging item (Version constant). Retirement requires actually publishing v1.0.0 — this is the showcase.
    depends_on:
    - T1.1
    - T1.2
    - T1.3
    - T1.4
    - T1.5
    - T1.6
    origin: replaces bullseye_init starter
    discovered: 2026-04-27
  T1.1:
    name: Breaking API renames from STABILITY.md are complete
    status: achieved
    value: 0.0
    cost: 0.0
    actual_cost: 2.0
    acceptance:
    - 'Task accessor methods renamed: TaskID/TaskName/TaskWorkDir/TaskStatus → ID/Name/WorkDir/Status. RunTask → Run. CancelTask/StopTask → Cancel/Stop.'
    - Task.SetLastResult removed from public API (moved to a constructor option or made package-private).
    - Config.DisallowTools changed from comma-separated string to []string for parity with ExtraArgs.
    - Event.Raw type mismatch resolved — declared and populated as []byte (or json.RawMessage with explicit conversion in the parser), no relying on string→RawMessage coincidence.
    - AgentDef.Parent audited and removed if no consumer needs it; documented otherwise.
    - Registry.Start renamed (Launch or StartAgent) so it no longer shadows the package-level Start.
    - STABILITY.md "API design fixes (breaking)" subsection is fully struck through or removed.
    context: All items are listed verbatim in STABILITY.md §"API design fixes (breaking)". They are deliberately deferred until the v1.0 ship to avoid churning consumers with a string of small breaking releases. Cluster them into one (or a small chain of) breaking PR(s) so consumers absorb the transition once.
    origin: STABILITY.md gap audit
    discovered: 2026-04-27
    achieved: 2026-04-29
  T1.2:
    name: Behavioural rough edges flagged in STABILITY.md are resolved
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'TermLogPath no longer lies after write failures: either the accessor returns "" once logging is silently disabled, or a separate "is logging live" accessor exists, with behaviour documented.'
    - Terminal log run-boundary marker decision recorded — either a marker format is implemented, or the design choice to concatenate without markers is documented in agents-guide.md / STABILITY.md with rationale.
    - Session-mode cost/usage accounting story is settled — either Session mode parses usage from the JSONL transcript, or the asymmetry with Task mode is documented as an explicit design choice.
    - OnEvent's single-handler limitation replaced by a subscribe/unsubscribe or channel-returning primitive that supports multiple consumers without collisions.
    - Readiness tuning (capture-pane regex poll interval, overall timeout) configurable via Config if consumers report timeouts; otherwise documented as deliberately fixed.
    - STABILITY.md "Behavioural fixes" subsection is fully struck through or removed.
    context: These are the items in STABILITY.md §"Behavioural fixes". Some (TermLogPath, run-boundary markers) are small and can be fixed inline; others (Session-mode usage accounting, OnEvent multi-consumer) are larger design questions. Each can ship in its own minor release pre-1.0 — they don't need to cluster like the API renames.
    depends_on:
    - T1.1
    origin: STABILITY.md gap audit
    discovered: 2026-04-27
    achieved: 2026-04-30
  T1.3:
    name: Package and type-level docs are sufficient for go doc / pkg.go.dev
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Every exported type, function, method, and constant in claudia and claudia/grok has a doc comment readable as standalone go doc output.
    - 'At least one runnable Example function in *_test.go for each of: Task mode, Session mode, Acquire/Release, Registry. pkg.go.dev renders these.'
    - STABILITY.md "Documentation" subsection is fully struck through or removed.
    context: Item from STABILITY.md §"Documentation". `go doc` should be self-sufficient before 1.0 — consumers reading the API reference shouldn't need to cross-reference STABILITY.md or README to understand what a function does. Examples in *_test.go also get rendered as runnable snippets on pkg.go.dev, which is the canonical Go discovery surface.
    depends_on:
    - T1.1
    origin: STABILITY.md gap audit
    discovered: 2026-04-27
    achieved: 2026-04-30
  T1.4:
    name: CLAUDIA_LIVE=1 is the documented pre-release validation step for end-to-end coverage
    status: achieved
    value: 0.0
    cost: 0.0
    actual_cost: 1.0
    acceptance:
    - README and/or agents-guide.md document `CLAUDIA_LIVE=1 go test -race -count=1 ./...` (with the `claude` binary on PATH and Anthropic auth in place) as the canonical pre-release validation command — explaining what it covers (real-binary tmux-backed Agent send/receive, crash-survival, pool acquire/release, Task-mode end-to-end) and why CI doesn't run it (auth + per-run cost).
    - 'STABILITY.md''s "Testing and CI" subsection is rewritten: drop the "CI does not exercise tmux-backed Agent on Linux runners" gap (it is now a deliberate scope decision, not a gap), and drop the "Task mode still has no end-to-end smoke test" line (TaskRun''s CLAUDIA_LIVE-gated test in task_test.go already covers it — verify and reference by name).'
    - The /release skill's tests-exist gate runs the live test suite as part of pre-release verification (the skill already declares this in Phase 4.5 — verify it triggers for claudia and surfaces a failure if either CLAUDIA_LIVE is unset or the live tests fail).
    - If a stub-claude-binary path is later considered desirable, it is filed as a separate forked target (e.g. T1.4.1) rather than re-expanding T1.4's scope.
    context: 'Original T1.4 wanted CI itself to exercise the tmux-backed Agent end-to-end on Linux. That''s infeasible without one of: (a) installing the `claude` binary on the runner and providing Anthropic auth as a GitHub secret (burns API credit per push, sets a precedent the rest of the ecosystem doesn''t follow); (b) building a stub `claude` binary that fakes the prompt-box readiness pattern and replays canned JSONL (real work, deferred). The honest answer for v1.0 is that the integration tests are CLAUDIA_LIVE-gated by design and only run locally before tagging. CI already installs tmux on Linux and runs every test that doesn''t require `claude` — that''s enough for the substrate-correctness claim. The pre-release live run, enforced by /release''s tests-exist gate, covers the rest. T1.4 is now about making that contract explicit in the docs and STABILITY.md rather than expanding CI.'
    origin: reshaped from original CI-end-to-end framing after credentials/auth feasibility review on 2026-04-27
    discovered: 2026-04-27
    achieved: 2026-04-27
  T1.5:
    name: claudia exposes a Version constant kept in sync by the release skill
    status: achieved
    value: 0.0
    cost: 0.0
    actual_cost: 1.0
    acceptance:
    - Package claudia exposes `const Version = "x.y.z"` matching the most recent release tag.
    - The /release skill's prep step updates this constant as part of the version-bump commit (or scripts/hooks enforce that the constant matches the upcoming tag).
    - STABILITY.md "Packaging" note about "No version constant" is struck through.
    context: Item from STABILITY.md §"Packaging". Without an in-source version, consumers can only learn claudia's version from go.mod, which is awkward for runtime diagnostics ("which claudia is this binary using?"). Small change, mostly mechanical, but it requires release-skill cooperation so the constant doesn't drift from the tag.
    origin: STABILITY.md gap audit
    discovered: 2026-04-27
    achieved: 2026-04-27
  T1.6:
    name: claudia has accumulated a 1-month shakeout period with no breaking API changes since v0.12.0
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - The current date is on or after 2026-06-19 (one month after the v0.12.0 tag of 2026-05-19).
    - 'No commit on master between v0.12.0 and HEAD changes the public API of github.com/marcelocantos/claudia or github.com/marcelocantos/claudia/grok in a backwards-incompatible way (no removals, no signature changes, no exported-field type changes). Verified mechanically by `gorelease -base=v0.12.0` (wraps golang.org/x/exp/apidiff): the suggested bump must be below major — a patch or minor suggestion means the change set is additive-or-none and the clock stands; a major suggestion means a breaking change landed and the clock resets. Additive changes are fine.'
    - STABILITY.md's snapshot reflects the current release.
    - 'If a breaking change is judged necessary during the shakeout, the clock resets: this target reverts to Identified and the not-before date is recomputed from the new breaking release''s tag date.'
    context: claudia's ~74-item public surface would normally get a 3-month settling period under the release skill's default table, but in the current LLM-coding era a month of real use shakes out as much as a quarter used to. The clock previously ran from v0.10.0 (2026-04-29) but reset on 2026-05-19 when v0.12.0 shipped a breaking change to grok.Client.SendText (added a modalities parameter for per-call modality selection). The earliest eligible 1.0 cut date is therefore 2026-06-19. This target makes that prerequisite explicit in the graph rather than buried in T1's prose, so the showcase release cannot fire prematurely. Forked from T1 on 2026-05-02 after recognising the shakeout gap during convergence evaluation; period shortened from 3 months to 1 month per user direction the same day. Clock reset on 2026-05-19 per v0.12.0 SendText signature change.
    origin: forked-from T1 (2026-05-02)
    discovered: 2026-05-02
  T2:
    name: claudia lifecycle broker daemon — autonomous multi-consumer control plane
    status: identified
    value: 13.0
    cost: 21.0
    acceptance:
    - A standalone `claudia broker` daemon manages all claude process lifecycle across all consumers on the host.
    - The daemon is installable via `brew services start claudia`.
    - '`claudia broker tail` streams structured events (throttle, reap, preempt, resume, cost) for observability.'
    - The library SDK defaults to broker mode when the Unix socket exists, falls back to direct mode (today's behaviour) when the socket is absent.
    - All T2.x sub-targets are achieved.
    context: |
      Explored during 2026-06-10 design session. Motivation: multiple consumers on the same host competing for Anthropic rate-limit slots, warm pool waste, no cross-process cost visibility. The broker owns lifecycle policy (concurrency, pooling, idle reaping, preemption, cost tracking) while the library API surface is unchanged — Start()/Acquire()/NewTask() become thin RPC calls to the broker socket when it exists, with a brokerless fallback for single-process embedding. The novel value add over existing tools (ccusage, cc-budget, Bifrost) is per-agent lifecycle policy — spawn/preempt/reap decisions — which none of those tools handle. Prior art survey: ccusage for spend parsing, Holt-Winters (cc-budget) for forecasting, Bifrost/LiteLLM for request-level gating as a complementary layer. Anthropic Admin API (/v1/organizations/cost_report) provides ground-truth reconciliation every ~10 min; local token-count tracking provides the real-time signal. Admin API integration must be double-gated on explicit config opt-in AND the presence of ANTHROPIC_ADMIN_API_KEY (per mnemo cost_reconciliation opt-in precedent).
    depends_on:
    - T2.1
    - T2.2
    - T2.3
    - T2.4
    - T2.5
    - T2.6
    - T2.7
    - T2.8
    origin: design session 2026-06-10
    discovered: 2026-06-10
  T2.1:
    name: Broker protocol and Unix socket transport
    status: identified
    value: 3.0
    cost: 5.0
    acceptance:
    - The broker listens on a well-known Unix socket (~/.local/state/claudia/broker.sock).
    - Protocol is newline-delimited JSON over the socket.
    - Request types cover at minimum spawn, release, status, tail.
    - The library's brokerless fallback is exercised by CLAUDIA_NO_BROKER=1 env var.
    - A minimal integration test exercises spawn/release over a real socket.
    origin: design session 2026-06-10
    discovered: 2026-06-10
  T2.2:
    name: AIMD concurrency control with per-model tuning
    status: identified
    value: 5.0
    cost: 5.0
    acceptance:
    - The broker tracks in-flight agent slots per model.
    - On a 429 response observed from any agent, the broker applies multiplicative decrease (halve available slots for that model).
    - Slots recover additively (one slot per clean turn-completion window).
    - The broker emits throttle and recover events on the tail stream.
    - No static concurrency knob is exposed to the consumer — policy is fully self-tuning.
    context: |
      Anthropic rate limits hit fast with parallel agents; opus-4-7 accounted for 96% of a 7-day $14.9k spend (62% of messages at 14x per-token cost vs sonnet). Per-model AIMD is therefore the single highest-leverage lever. The 429 signal is the authoritative backpressure signal — no need to guess at rate-limit headroom.
    depends_on:
    - T2.8
    origin: design session 2026-06-10
    discovered: 2026-06-10
  T2.3:
    name: Warm pool shared across consumers
    status: identified
    value: 3.0
    cost: 5.0
    acceptance:
    - The broker maintains a pool of warm (idle) claude processes in tmux.
    - Pool size adapts to observed spawn rate per (model, workdir) pair.
    - A consumer calling spawn receives a pre-warmed agent when one is available, reducing per-spawn latency.
    - Pool drains when the spawn rate drops to zero for a configurable idle window (default 10 minutes).
    context: |
      Today pool.go is per-process; idle warm agents from one consumer are unavailable to another. The broker makes the pool global, enabling cross-consumer reuse. The pool substrate is unchanged (tmux); the broker just owns the policy of how many to keep warm.
    origin: design session 2026-06-10
    discovered: 2026-06-10
  T2.4:
    name: Cost tracking — local token accounting and optional Anthropic Cost API reconciliation
    status: identified
    value: 5.0
    cost: 5.0
    acceptance:
    - The broker accumulates spend in real-time from per-turn token counts (Task mode CostUSD field; Session mode derived from JSONL usage blocks + built-in price table).
    - An optional reconciliation loop polls /v1/organizations/cost_report every ~10 minutes when both ANTHROPIC_ADMIN_API_KEY is set AND cost_reconciliation.enabled is true in ~/.config/claudia/broker.yaml. Absent either, the broker logs "reconciliation unavailable, running open-loop" and uses local estimates only.
    - The single user-configurable ceiling is daily_cap_usd in broker.yaml (optional; omit for no cap). All other throttle policy is derived automatically.
    - The broker emits cost_update and budget_warning events on the tail stream.
    context: |
      Admin API reconciliation follows the same double-gate pattern as mnemo cost reconciliation (see mnemo CLAUDE.md): key alone is not enough, explicit opt-in is required. Users in security-reviewed environments must not trigger outbound calls to hosted APIs due to ambient key presence. The local token-count path is always-on and requires zero external calls. mnemo_usage (already supports group_by=model) is available as an alternative read path for historical cost data; the broker's real-time loop avoids the MCP round-trip overhead.
    depends_on:
    - T2.8
    origin: design session 2026-06-10
    discovered: 2026-06-10
  T2.5:
    name: Idle reaping with model-cost-weighted thresholds
    status: identified
    value: 2.0
    cost: 2.0
    acceptance:
    - The broker reaps idle agents after a model-weighted idle timeout (defaults — opus 5 minutes, sonnet 15 minutes, haiku 60 minutes).
    - The broker emits reap events on the tail stream.
    - No per-consumer idle-timeout knob is exposed to the API.
    context: |
      Idle opus processes are disproportionately expensive to keep around relative to sonnet/haiku. Model-weighted thresholds are a simple, no-knob policy that matches cost sensitivity without user configuration.
    depends_on:
    - T2.8
    origin: design session 2026-06-10
    discovered: 2026-06-10
  T2.6:
    name: Priority and preemption (interactive > batch)
    status: identified
    value: 3.0
    cost: 5.0
    acceptance:
    - Agent priority is inferred automatically from mode and recency (Session agents with recent human input = interactive; Task agents = batch; idle Session agents = background).
    - Under concurrency pressure (AIMD slots exhausted), the broker suspends the longest-idle lowest-priority agent (tmux suspend-pane) and resumes when capacity returns.
    - Consumers observe paused/resumed events via SubscribeEvents.
    - No explicit priority hint in the API — intent is inferred from mode.
    depends_on:
    - T2.8
    origin: design session 2026-06-10
    discovered: 2026-06-10
  T2.7:
    name: brew services compatible daemon and claudia broker tail telemetry
    status: identified
    value: 2.0
    cost: 2.0
    acceptance:
    - The Homebrew formula includes a launchd plist so `brew services start claudia` starts the broker on login.
    - '`claudia broker tail` streams all broker events as newline-delimited JSON.'
    - '`claudia broker status` prints a human-readable summary of active agents, pool depth, AIMD slots, and rolling cost.'
    origin: design session 2026-06-10
    discovered: 2026-06-10
  T2.8:
    name: Broker policy is verified by deterministic oracles, not live observation
    status: identified
    value: 5.0
    cost: 5.0
    acceptance:
    - Injectable clock and rate-limit/429 signal interfaces exist and are the ONLY way broker policy code (AIMD, idle reaping, pool drain, preemption) reads time and backpressure; a vet/grep check fails the build if a policy path calls time.Now/time.After/time.Sleep or reads a live socket for these signals directly. (Today pool.go reads time.Now().Unix() directly — this is a real change, not free.)
    - A behavioral fake-`claude` test double exists that, on command, emits 429 responses, canned JSONL usage blocks, and the readiness prompt-box pattern — letting AIMD/cost/reaping/preemption loops run headless in `go test -race` CI with zero API credit and no real claude binary. (Extends the exit-0 shim already in task_test.go into a behavioural fake.)
    - The agent lifecycle state machine (idle→granted→in-use→paused→resumed→reaped→reclaimed) has a model-checked spec (TLA+ or equivalent), SEEDED BEFORE T2.6 implementation, whose mutation test confirms it catches an injected double-ownership fault and an injected Send-after-reaped fault.
    - 'A one-page oracle map (docs/) declares, per T2.x policy target, its verification class and the specific machine oracle that gates it: T2.1 golden wire vectors + real-socket round-trip; T2.2 seeded-429 AIMD simulator (never-exceed-cap, halve-on-429, additive-recover); T2.4 bounded-drift cost diff (|local − reconciler| < ε over a window, NOT equality — the reconciler lags ~5min); T2.5 virtual-clock reap-threshold assertions; T2.6 lifecycle model-check (no double-ownership, no Send-after-reap). No policy sub-target is retired on live-observation evidence.'
    - The residual un-oracled surface — policy-DESIGN validity (is AIMD / model-weighted TTL / intent-inference the RIGHT model, not merely correctly implemented) — is declared as explicit accepted risk, gated by dogfooding plus a single human accept/reject, never silence.
    context: 'Oracle-first analysis (2026-07-05) of the T2 broker epic. The broker is a concurrent, timing-driven, control-loop system with almost no external referent — new-code oracle mode (author the spec as executable checks, à la csp/doit), not port mode. The dominant human cost term is verification-judgment, and the trap is verifying policy by running the live broker and watching 429s/timers/preemptions — a class-4 dynamical signal that is non-reproducible and worth ~1 bit per round-trip (oracle-first rule 2). This target is the choke-point foundation that makes every policy sub-target deterministically testable BEFORE it is built: inject the clock and the 429 source, manufacture a behavioural fake-claude referent, seed the lifecycle model-check, and declare per-target oracles up front. It embodies oracle-first rule 12 (seed load-bearing properties before code; manufacture a referent; test the oracle via mutation; declare the residual as accepted risk). Wiring it as a blocker of T2.2/T2.4/T2.5/T2.6 encodes ''build the oracle first'' in the graph shape. T2.1 (protocol, class-1 golden vectors) is the natural first PR and the place the clock seam + fake-claude foundation incubate.'
    origin: oracle-first analysis 2026-07-05
    discovered: 2026-07-05
  T3:
    name: Library SDK is a thin broker client with transparent brokerless fallback
    status: identified
    value: 8.0
    cost: 8.0
    acceptance:
    - Start(), Acquire(), NewTask(), and Pool are implemented as RPC calls to the broker socket when the socket is present.
    - When the socket is absent (or CLAUDIA_NO_BROKER=1), the library falls back to today's direct-spawn behaviour with no API change.
    - The public API surface is unchanged for consumers — broker vs. direct is a runtime decision, not a compile-time one.
    - All existing tests pass in both modes.
    - The T1.6 shakeout window is not disturbed by the SDK pivot (broker path is additive; direct path is unchanged).
    context: |
      The broker client path must be strictly additive so the T1.6 shakeout clock is not reset — consumers who don't run the broker see identical behaviour. The brokerless fallback is the existing direct-spawn code, not a stub; it must remain a fully supported mode for single-process embedding and for users who don't want the daemon.
    depends_on:
    - T2.1
    origin: design session 2026-06-10
    discovered: 2026-06-10
  T4:
    name: claudia supports Codex as a first-class provider alongside Claude Code
    status: identified
    value: 13.0
    cost: 13.0
    acceptance:
    - The public API can start either a Claude Code-backed agent/task or a Codex-backed agent/task without duplicating caller workflow code.
    - Codex Task mode is implemented on top of documented `codex exec --json` output, with session IDs, assistant text, tool/command progress, result status, and token usage mapped into provider-neutral events.
    - Codex persistent Session mode uses a documented public Codex interface (`codex app-server` JSON-RPC or a later stable equivalent), not private Codex transcript files or brittle TUI scraping.
    - 'Provider-specific unsupported features are explicit: Codex rewind, cost accounting, permission mapping, and tmux attach semantics either work through public Codex contracts or return documented capability errors.'
    - README, agents-guide.md, and STABILITY.md describe provider selection, binary discovery, known differences, and the compatibility contract.
    - All T4.x sub-targets are achieved.
    context: |
      Raised 2026-07-06 from the feasibility discussion about adapting claudia for Codex. The strategic shape is provider-first rather than a rename from `claude` to `codex`: claudia currently embeds Claude Code's contracts directly (`claude -p --output-format stream-json`, ~/.claude/projects JSONL transcripts, `--resume`, `--session-id`, TUI readiness, and transcript rewind). Codex offers enough public surface to support the same product idea, but with different seams: `codex exec --json` for non-interactive work, `codex exec resume` for continuing non-interactive sessions, and `codex app-server` JSON-RPC for richer persistent thread/turn integrations. The hard rule for this epic is to depend only on public Codex contracts. Private Codex storage formats and opportunistic TUI scraping are explicitly out of bounds because they would make claudia fragile across Codex releases.
    depends_on:
    - T4.1
    - T4.2
    - T4.3
    - T4.4
    - T4.5
    - T4.6
    - T4.7
    - T4.8
    origin: user strategy request 2026-07-06
    discovered: 2026-07-06
  T4.1:
    name: Provider boundaries isolate Claude Code and Codex runtime contracts
    status: achieved
    value: 5.0
    cost: 5.0
    actual_cost: 5.0
    acceptance:
    - A small internal provider interface separates binary discovery, argument construction, event parsing, session identity, capability reporting, and resume semantics from Agent/Task lifecycle code.
    - 'Existing Claude Code behaviour remains byte-for-byte compatible where externally observable: default provider is Claude, existing Config and TaskConfig calls still work, and existing tests pass without requiring Codex.'
    - Provider-neutral events preserve the existing TaskEvent/Event API where possible and introduce provider-specific detail only behind additive fields or raw payload access.
    - The design does not use functional options; any new public configuration uses explicit struct fields.
    - A regression test proves a fake Claude provider and fake Codex provider can both drive the same Task lifecycle without spawning real binaries.
    context: |
      This is the architectural choke point. Without it, Codex support would leak CLI-specific conditionals through Start, Acquire, Task.Run, transcript parsing, rewind, and tests. The change must be additive so it does not disturb the v1.0 shakeout target: Claude remains the default and existing consumers see no API break.
      Converging 2026-07-06: Task.Run now delegates binary resolution, argument construction, event parsing, resume identity, raw logs, and interrupt handling to an internal task backend. Fake Claude and fake Codex task backends exercise the same Task lifecycle. Remaining T4.1 work is to apply the provider boundary to Agent/session lifecycle code and make provider capability reporting explicit.
      Achieved 2026-07-06: Agent Start/Send/Interrupt/Resize/Stop/AttachCommand now route through an internal agent backend/runtime-ops seam; Task.Run routes through an internal task backend; both backend families expose provider capabilities. Fake Claude and fake Codex backends exercise the same Agent and Task lifecycles without real binaries, while Claude remains the default public behaviour.
    origin: user strategy request 2026-07-06
    discovered: 2026-07-06
    achieved: 2026-07-06
  T4.2:
    name: Codex binary discovery is reliable across CLI and desktop-app installs
    status: achieved
    value: 2.0
    cost: 2.0
    actual_cost: 2.0
    acceptance:
    - Codex provider resolution checks `CODEX_BIN`, then `exec.LookPath("codex")`, then known app-bundle locations including `/Applications/Codex.app/Contents/Resources/codex`.
    - Resolver tests cover absolute `CODEX_BIN`, PATH lookup, missing executable, and app-bundle fallback without depending on the host's real Codex install.
    - Error messages tell users how to install Codex, set `CODEX_BIN`, or use the app-bundle binary when Codex is not on PATH.
    - Documentation states that Codex Desktop may exist even when `codex` is not on PATH.
    context: |
      The local feasibility check found Codex at `/Applications/Codex.app/Contents/Resources/codex` while `codex` was not generally on PATH for the user. Binary resolution should mirror claudia's existing Claude resolver but must account for the desktop app bundle.
      Achieved 2026-07-06: Added an internal Codex resolver that checks CODEX_BIN, PATH, and known install locations including the macOS desktop app bundle. Tests cover absolute CODEX_BIN, PATH lookup, missing executable errors, and app-bundle fallback without depending on a real Codex install. README and agents-guide.md document the desktop-app-without-PATH case.
    depends_on:
    - T4.1
    origin: user strategy request 2026-07-06
    discovered: 2026-07-06
    achieved: 2026-07-06
  T4.3:
