name: specs

# Formal-verification oracle for the broker lifecycle (T2.0). Kept separate
# from test.yml so the Go matrix and the TLA+ model-check evolve independently.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  tlc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Fetch tla2tools.jar
        run: |
          mkdir -p "$HOME/.local/lib"
          curl -fsSL -o "$HOME/.local/lib/tla2tools.jar" \
            https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar

      # verify-specs asserts the correct spec is green AND both fault-injection
      # mutants are caught — proving the invariants have teeth, not just that
      # they are satisfiable.
      - name: Model-check broker lifecycle spec
        run: make verify-specs
